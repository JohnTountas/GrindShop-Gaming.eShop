# Local orchestration for postgres, backend, and frontend services.
services:
  postgres:
    # Local development database that mirrors the production Postgres engine family.
    image: postgres:16-alpine
    container_name: grindspot-Database
    restart: unless-stopped
    environment:
      POSTGRES_USER: grindspot
      POSTGRES_PASSWORD: grindspot_password
      POSTGRES_DB: grindspot_DB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grindspot -d grindspot_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grindspot-Backend
    restart: unless-stopped
    environment:
      # Compose service names are resolvable as hostnames inside the Docker network.
      DATABASE_URL: postgresql://grindspot:grindspot_password@postgres:5432/grindspot_DB
      DIRECT_URL: postgresql://grindspot:grindspot_password@postgres:5432/grindspot_DB
      JWT_SECRET: grindspot-access-token-signing-key-change-me
      JWT_REFRESH_SECRET: grindspot-refresh-token-signing-key-change-me
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 5000
      NODE_ENV: development
      AUTO_SEED: "true"
      # Local demo accounts are intentional here; production uses Fly secrets instead.
      SEED_ADMIN_EMAIL: admin@grindspot.com
      SEED_ADMIN_PASSWORD: admin123
      SEED_USER_EMAIL: user@grindspot.com
      SEED_USER_PASSWORD: user123
      CORS_ORIGIN: http://localhost:3000
      STRIPE_SECRET_KEY: sk_test_grindspot_secret_key_change_me
      STRIPE_WEBHOOK_SECRET: whsec_grindspot_webhook_secret_change_me
    ports:
      - "5000:5000"
    volumes:
      # Persist uploaded assets outside the container while iterating locally.
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Frontend points at the backend container published on localhost:5000.
        VITE_API_URL: http://localhost:5000/api
        VITE_STRIPE_PUBLIC_KEY: pk_test_grindspot_publishable_key_change_me
    container_name: grindspot-Frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
