# Local orchestration for postgres, backend, and frontend services.
services:
  postgres:
    image: postgres:16-alpine
    container_name: grindspot-Database
    restart: unless-stopped
    environment:
      POSTGRES_USER: grindspot
      POSTGRES_PASSWORD: grindspot_password
      POSTGRES_DB: grindspot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grindspot -d grindspot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grindspot-Backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://grindspot:grindspot_password@postgres:5432/grindspot
      JWT_SECRET: grindspot-access-token-signing-key-change-me
      JWT_REFRESH_SECRET: grindspot-refresh-token-signing-key-change-me
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 5000
      NODE_ENV: development
      AUTO_SEED: "true"
      CORS_ORIGIN: http://localhost:3000
      STRIPE_SECRET_KEY: sk_test_grindspot_secret_key_change_me
      STRIPE_WEBHOOK_SECRET: whsec_grindspot_webhook_secret_change_me
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
        VITE_STRIPE_PUBLIC_KEY: pk_test_grindspot_publishable_key_change_me
    container_name: grindspot-Frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
