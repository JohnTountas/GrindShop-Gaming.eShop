# Continuous integration for both backend and frontend quality gates.
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      # Ephemeral Postgres container used by Prisma migrations and backend tests.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: grindspot
          POSTGRES_PASSWORD: grindspot_password
          POSTGRES_DB: grindspot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      # Fail fast on style and static typing issues before integration steps.
      - name: Lint
        working-directory: ./backend
        run: npm run lint

      - name: Type check
        working-directory: ./backend
        run: npm run type-check

      - name: Run migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://grindspot:grindspot_password@localhost:5432/grindspot_test
          DIRECT_URL: postgresql://grindspot:grindspot_password@localhost:5432/grindspot_test
        run: npx prisma migrate deploy

      # Backend tests run after the schema is in place.
      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://grindspot:grindspot_password@localhost:5432/grindspot_test
          DIRECT_URL: postgresql://grindspot:grindspot_password@localhost:5432/grindspot_test
          JWT_SECRET: grindspot-ci-access-token-secret
          JWT_REFRESH_SECRET: grindspot-ci-refresh-token-secret
          NODE_ENV: test
        run: npm test

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      # Frontend CI verifies style, types, bundle production, and test runtime.
      - name: Lint
        working-directory: ./frontend
        run: npm run lint

      - name: Type check
        working-directory: ./frontend
        run: npm run type-check

      - name: Build
        working-directory: ./frontend
        run: npm run build

      - name: Run tests
        working-directory: ./frontend
        run: npm test
