services:
  - type: web
    name: grindspot
    env: docker
    plan: starter
    dockerContext: .
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /health
    disk:
      name: grindspot-postgres-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: RUN_MIGRATIONS
        value: "true"
      - key: AUTO_SEED
        value: "false"
      - key: POSTGRES_USER
        value: grindspot
      - key: POSTGRES_PASSWORD
        sync: false
      - key: POSTGRES_DB
        value: grindspot
      - key: POSTGRES_DATA_DIR
        value: /var/data/postgres
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: MAX_FILE_SIZE
        value: "5242880"
      - key: UPLOAD_DIR
        value: uploads
